<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111111" />
    <title>Interactive Catalog Flipbook</title>
    <meta
      name="description"
      content="Interactive flipbook catalog with searchable pages and clickable table of contents."
    />
    <link rel="preload" as="image" href="pages/page-001.webp" />
    <link rel="stylesheet" href="styles.css?v=24" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <button class="brand-home" id="homeButton" type="button" aria-label="العودة إلى بداية الكاتالوج">
            <img src="assets/edafat-logo-white.png" alt="إضافات" />
          </button>
          <span class="brand-tagline">Hospitality Supplier · KSA</span>
        </div>

        <div class="toolbar" aria-label="Catalog controls">
          <button class="icon-button" id="tocButton" type="button" title="الفهرس" aria-label="الفهرس">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16" /></svg>
          </button>
          <button class="icon-button" id="searchButton" type="button" title="بحث" aria-label="بحث">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" /></svg>
          </button>
          <button class="icon-button" id="zoomOutButton" type="button" title="تصغير" aria-label="تصغير">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14" /></svg>
          </button>
          <button class="icon-button" id="zoomInButton" type="button" title="تكبير" aria-label="تكبير">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" /></svg>
          </button>
          <button class="icon-button" id="shareButton" type="button" title="مشاركة" aria-label="مشاركة">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a3 3 0 1 0-2.8-4M6 14a3 3 0 1 0 0 6 3 3 0 0 0 0-6Zm12-4a3 3 0 1 0 0 6 3 3 0 0 0 0-6ZM8.7 15.2l6.6-3.4M8.7 18.8l6.6 3.4" /></svg>
          </button>
          <a class="partner-link price-link" href="assets/price-list.pdf" target="_blank" rel="noopener noreferrer">Price List</a>
          <a class="partner-link" href="https://marketing635.github.io/edafat/" target="_blank" rel="noopener noreferrer">كن شريكنا</a>
        </div>
      </header>

      <section class="workspace">
        <aside class="drawer" id="drawer" aria-label="الفهرس والبحث">
          <div class="drawer-tabs" role="tablist">
            <button class="tab active" id="tocTab" type="button">الفهرس</button>
            <button class="tab" id="searchTab" type="button">البحث</button>
          </div>

          <div class="panel active" id="tocPanel">
            <button class="toc-home" id="backToTocButton" type="button">رجوع للفهرس</button>
            <nav class="toc-list" id="tocList" aria-label="Catalog sections"></nav>
          </div>

          <div class="panel" id="searchPanel">
            <label class="search-box">
              <span>بحث</span>
              <input id="searchInput" type="search" autocomplete="off" placeholder="اسم منتج أو قسم" />
            </label>
            <div class="search-results" id="searchResults"></div>
          </div>
        </aside>

        <section class="book-stage" aria-label="Interactive catalog">
          <button class="nav-button prev" id="prevButton" type="button" aria-label="الصفحة السابقة">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6" /></svg>
          </button>

          <div class="viewport" id="viewport">
            <div class="book" id="book"></div>
            <span class="page-status" id="pageStatus">Page 1 / 76</span>
          </div>

          <button class="nav-button next" id="nextButton" type="button" aria-label="الصفحة التالية">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6" /></svg>
          </button>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="data/search-index.js?v=11"></script>
    <script src="app.js?v=34"></script>
  </body>
</html>
